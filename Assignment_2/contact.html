<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - StepStyle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar shadow-sm">
    <div class="container nav-inner">
      <a href="index.html" class="brand"><div class="brand-circle">S</div> StepStyle</a>
      <nav class="nav-links">
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <section class="page-header-dark">
    <div class="container text-center">
      <h1 style="color:white; font-size: 2.5rem;">Get In Touch</h1>
      <p style="color:#cbd5e1;">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
    </div>
  </section>

  <main class="container" style="padding: 60px 0;">
    <div class="cart-grid">
      <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="card" style="display:flex; align-items:center; gap:20px;">
          <div class="brand-circle">📍</div>
          <div><div class="bold">Address</div><div class="muted small">123 Shoe Street, NY 10001</div></div>
        </div>
        <div class="card" style="display:flex; align-items:center; gap:20px;">
          <div class="brand-circle">📞</div>
          <div><div class="bold">Phone</div><div class="muted small">(555) 123-4567</div></div>
        </div>
        <div class="card" style="display:flex; align-items:center; gap:20px;">
          <div class="brand-circle">✉️</div>
          <div><div class="bold">Email</div><div class="muted small">info@stepstyle.com</div></div>
        </div>
        <div class="card" style="display:flex; align-items:center; gap:20px;">
          <div class="brand-circle">🕒</div>
          <div><div class="bold">Hours</div><div class="muted small">Mon - Fri, 9am - 6pm</div></div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 20px;">Send us a Message</h3>
        <div class="two-col-grid">
          <div class="field"><label>Your Name *</label><input type="text"></div>
          <div class="field"><label>Your Email *</label><input type="email"></div>
        </div>
        <div class="field"><label>Subject *</label><input type="text"></div>
        <div class="field"><label>Message *</label><textarea rows="5" style="width:100%; border-radius:10px; border:1px solid var(--border); padding:10px;"></textarea></div>
        <button class="btn-primary">✉️ Send Message</button>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
