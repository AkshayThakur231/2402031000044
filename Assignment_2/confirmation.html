<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Confirmed - StepStyle</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Status Tracker CSS */
    .status-tracker { display: flex; justify-content: space-between; margin-top: 24px; position: relative; }
    .status-tracker::after { content: ''; position: absolute; top: 15px; left: 0; width: 100%; height: 4px; background: #e5e7eb; z-index: 1; }
    .status-progress { position: absolute; top: 15px; left: 0; width: 25%; height: 4px; background: #10b981; z-index: 2; transition: 0.4s; }
    .status-step { position: relative; z-index: 3; text-align: center; width: 60px; }
    .step-icon { width: 32px; height: 32px; background: white; border: 4px solid #e5e7eb; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .status-step.completed .step-icon { border-color: #10b981; color: #10b981; }
    .status-step.completed .step-icon::after { content: '✓'; font-weight: bold; }
  </style>
</head>
<body>
  <header class="navbar shadow-sm">
    <div class="container nav-inner">
      <a href="index.html" class="brand"><div class="brand-circle">S</div><span>StepStyle</span></a>
    </div>
  </header>

  <main class="container" style="max-width: 800px; padding-top: 40px; padding-bottom: 60px;">
    <div class="card text-center" style="margin-bottom: 24px;">
      <div class="tick-circle" style="width: 64px; height: 64px; font-size: 32px; background: #dcfce7; color: #10b981; margin: 0 auto 16px;">✓</div>
      <h1 style="font-size: 1.75rem; margin-bottom: 8px;">Order Confirmed!</h1>
      <p class="muted small">Thank you for your purchase. Your order has been received and is being processed.</p>
      <div class="order-number" style="margin-top: 20px; background: #f8fafc; padding: 12px 24px; border-radius: 8px;">
        <span class="muted tiny">Order Number</span><br>
        <span id="orderNumberDisplay" class="bold">ORD-1773075956044</span>
      </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
      <h3 class="bold">Order Status</h3>
      <div class="status-tracker">
        <div class="status-progress"></div>
        <div class="status-step completed">
          <div class="step-icon"></div>
          <span class="tiny muted">Order Placed</span>
        </div>
        <div class="status-step">
          <div class="step-icon">📦</div>
          <span class="tiny muted">Processing</span>
        </div>
        <div class="status-step">
          <div class="step-icon">🚚</div>
          <span class="tiny muted">Shipped</span>
        </div>
        <div class="status-step">
          <div class="step-icon">🏠</div>
          <span class="tiny muted">Delivered</span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 24px;" id="orderItemsDisplay">
       <h3 class="bold" style="margin-bottom: 16px;">Order Details</h3>
       </div>

    <div class="card" id="orderShippingDisplay" style="margin-bottom: 32px;">
       <h3 class="bold" style="margin-bottom: 12px;">Shipping Address</h3>
       </div>

    <div style="display: flex; gap: 16px; justify-content: center;">
      <button class="btn-primary" style="width: 200px;">View My Orders</button>
      <a href="products.html" class="btn-ghost" style="width: 200px; text-align: center;">Continue Shopping</a>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const order = JSON.parse(localStorage.getItem('lastOrder'));
    if(order) {
      document.getElementById('orderNumberDisplay').innerText = order.id;
      
      // Render the Address
      document.getElementById('orderShippingDisplay').innerHTML += `
        <p class="small bold">${order.shipping.name}</p>
        <p class="small muted">${order.shipping.address}<br>${order.shipping.city}, ${order.shipping.zip}</p>
        <p class="small muted" style="margin-top:8px;">${order.shipping.email}<br>${order.shipping.phone}</p>
      `;

      // Render the Items (using the first item in cart as example like your image)
      const firstItem = JSON.parse(localStorage.getItem('stepStyleCart'))[0] || {name: "Air Max Classic", price: 129.99, image: "https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?auto=compress&cs=tinysrgb&w=800"};
      document.getElementById('orderItemsDisplay').innerHTML += `
        <div class="mini-cart-item" style="border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px;">
          <img src="${firstItem.image}" style="width: 60px; height: 60px; border-radius: 8px;">
          <div style="flex: 1;">
            <div class="bold small">${firstItem.name}</div>
            <div class="tiny muted">Size: 9 | Color: Black | Qty: 1</div>
          </div>
          <div class="bold small">$${firstItem.price.toFixed(2)}</div>
        </div>
        <div class="totals-row grand-total" style="border:0; padding:0; margin:0;">
          <span>Total</span><span>$140.39</span>
        </div>
      `;
    }
  </script>
</body>
</html>
