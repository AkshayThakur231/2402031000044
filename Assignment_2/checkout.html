<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout - StepStyle</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <header class="navbar shadow-sm">
    <div class="container nav-inner">
      <a href="index.html" class="brand"><div class="brand-circle">S</div><span>StepStyle</span></a>
      <div class="nav-right"><a href="cart.html" class="icon-btn">🛒 <span id="cartCount" class="badge">0</span></a></div>
    </div>
  </header>

  <main class="container">
    <div class="checkout-header">
      <a href="cart.html" class="link-back">← Back to Cart</a>
      <h1>Checkout</h1>
    </div>

    <form id="checkoutForm">
      <div class="checkout-grid">
        
        <div class="checkout-form-sections">
          <div class="card checkout-section">
            <h2>Contact Information</h2>
            <div class="field-grid">
              <div class="field"><label>Email Address: </label><input type="email" name="example@gmail.com" required /></div>
              <div class="field"><label>Phone Number: </label><input type="tel" name="phone no."  /></div>
            </div>
          </div>

          <div class="card checkout-section">
            <h2>Shipping Information</h2>
            <div class="field-grid">
              <div class="field"><label>Full Name: </label><input name="name"  required /></div>
              <div class="field"><label>Street Address: </label><input name="address" required /></div>
              <div class="two-col-grid">
                  <div class="field"><label>City: </label><input name="city" required /></div>
                  <div class="field"><label>Zip Code: </label><input name="zip" required /></div>
              </div>
            </div>
          </div>

          <div class="card checkout-section">
            <h2>Payment</h2>
            <div class="payment-methods">
              <div class="payment-pill active" id="pill_credit_card" onclick="selectPayment('credit_card')">Credit Card</div>
              <div class="payment-pill" id="pill_cod" onclick="selectPayment('cod')"><b>Cash on Delivery</b> (Don't Fill)</div>
            </div>
            
            <div class="credit-card-inputs field-grid" id="creditCardInputs">
                <div class="field"><label>Card Number:- </label><input name="card_num" placeholder="0000 0000 0000 0000" /></div>
                <div class="two-col-grid">
                    <div class="field"><label>Expiration: </label><input name="card_exp" placeholder="MM / YY" /></div>
                    <div class="field"><label>CVC: </label><input name="card_cvc" placeholder="***" /></div>
                </div>
            </div>
          </div>
        </div>

        <aside class="checkout-summary-col">
  		<div class="card summary-card" id="checkoutSummary">
    		</div>
  		<button type="submit" form="checkoutForm" class="btn-primary full">Place Order Now</button>
	</aside>

      </div>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
